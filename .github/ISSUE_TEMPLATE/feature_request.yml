name: Feature request
description: Suggest a Strava feed filtering feature.
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature
      description: Describe the filtering behavior you want.
    validations:
      required: true
  - type: textarea
    id: apk_clues
    attributes:
      label: APK clues
      description: Add any class names, strings, screenshots, or jadx findings that may help.
    validations:
      required: false
