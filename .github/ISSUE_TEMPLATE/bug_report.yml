name: Bug report
description: Report a problem with the Strava ReVanced patch.
title: "bug: "
labels: ["bug"]
body:
  - type: input
    id: strava_version
    attributes:
      label: Strava version
      placeholder: "466.12"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what went wrong and what you expected.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Describe how you built, installed, and tested the patch.
    validations:
      required: false
